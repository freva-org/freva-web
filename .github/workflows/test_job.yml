name: Tests
run-name: ${{ github.actor }} is doing some smoke tests

on: [push, pull_request, workflow_call]
jobs:
  Smoke-tests:
    runs-on: ubuntu-latest
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Create conda env
        # https://github.com/marketplace/actions/setup-micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-name: freva-web
          environment-file: dev-env.yml
          cache-environment: false
          cache-downloads: false
          init-shell: bash
      - name: Generate self signed certs
        run: >
          micromamba run -n freva-web python docker/config/dev-utils.py gen-certs
      - name: Set up services
        run: docker compose up -d --remove-orphans
      - name: Lint js code and python
        run: micromamba run -n freva-web make lint
      - name: Run build checks for js and python smoke tests
        run: micromamba run -n freva-web make tests

  build-docker-image:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Build node code
        run: |
          npm install
          npm run build-production

      - name: Build freva-web image for
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          build-args: |
            VERSION=test
            BUNDLE_HOST_PATH=${{ github.workspace }}
          push: false
          no-cache: true
          tags: freva-web:latest

  dependabot:
    name: Merge PR by dependabot
    runs-on: ubuntu-latest
    needs: [tests, build-docker-image]
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v1
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Approve dependabot's PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.TOKEN}}
      - name: Auto-merge for dependabot's PR
        run: gh pr merge --merge --auto "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.TOKEN}}
